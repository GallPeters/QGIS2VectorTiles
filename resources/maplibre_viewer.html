<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MapLibre Viewer</title>

    <!-- Served from utils -->
    <script src="http://localhost:_Q2VTPORT/maplibre-gl.js"></script>
    <link href="http://localhost:_Q2VTPORT/maplibre-gl.css" rel="stylesheet">

    <style>
        body { margin: 0; }
        #map { position: absolute; inset: 0; }
        #zoom-indicator {
            position: absolute;
            top: 10px; left: 10px;
            background: rgba(255,255,255,.9);
            padding: 8px 12px;
            border-radius: 4px;
            font: bold 14px Arial;
        }
    </style>
</head>
<body>

<div id="zoom-indicator">Zoom: 0</div>
<div id="map"></div>

<script>
const map = new maplibregl.Map({
    container: 'map',
    style: 'http://localhost:_Q2VTPORT/style/style.json',
    center: [0, 20],
    zoom: 2
});

map.addControl(new maplibregl.NavigationControl());

map.on('load', () => {
    map.addSource('osm', {
        type: 'raster',
        tiles: [
            'https://a.tile.openstreetmap.org/{z}/{x}/{y}.png',
            'https://b.tile.openstreetmap.org/{z}/{x}/{y}.png',
            'https://c.tile.openstreetmap.org/{z}/{x}/{y}.png'
        ],
        tileSize: 256
    });

    const firstLayerId = map.getStyle().layers[0]?.id;
    map.addLayer({ id: 'osm', type: 'raster', source: 'osm' }, firstLayerId);

    fetch('http://localhost:_Q2VTPORT/layers')
        .then(r => r.json())
        .then(layers => {
            layers.forEach(({ layer, minzoom, maxzoom, bounds }) => {
                if (!map.getSource(layer)) {
                    map.addSource(layer, {
                        type: 'vector',
                        tiles: [`http://localhost:_Q2VTPORT/tiles/${layer}/{z}/{x}/{y}.pbf`],
                        minzoom: Number(minzoom ?? 0),
                        maxzoom: Number(maxzoom ?? 14),
                        bounds: bounds
                            ? bounds.split(',').map(Number)
                            : [-180, -85.05, 180, 85.05]
                    });
                }
            });
        });
});

map.on('zoom', () => {
    document.getElementById('zoom-indicator').textContent =
        'Zoom: ' + map.getZoom().toFixed(2);
});
</script>

</body>
</html>
