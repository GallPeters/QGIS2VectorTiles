<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" sizes="16x16" href="icons/qgis2vectortiles.png">
<link rel="shortcut icon" href="docs/icons/qgis2vectortiles.ico">
<title>QGIS2VectorTiles — Compatibility Matrix</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/js-yaml/4.1.0/js-yaml.min.js"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

/* ════════════════════════════════════════
   DESIGN TOKENS  (Identical to changelog.html)
   Flat dark UI — QGIS brand palette.
════════════════════════════════════════ */
:root {
  /* Surfaces (opaque) */
  --bg:            #0d0d0d;
  --surface:       #161616;
  --surface-2:     #1c1c1c;
  --surface-3:     #222222;

  /* Borders (solid) */
  --border:        #262626;
  --border-2:      #333333;
  --border-3:      #404040;

  /* Brand accents — QGIS */
  --accent:        #7ec44a;
  --accent-hover:  #8ed35a;
  --accent-deep:   #2f4a1d;
  --accent-2:      #7ec44a;

  /* Typography */
  --text:          #ececec;
  --text-muted:    #a0a0a0;
  --text-dim:      #6f6f6f;
  --text-faint:    #4a4a4a;

  --header-h:      56px;

  /* Border radii — small, flat */
  --r-sm: 3px;
  --r-md: 4px;
  --r-lg: 6px;

  --t:      0.15s ease;
  --t-slow: 0.25s ease;

  --max-w: 1180px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html {
  scroll-behavior: smooth;
  scroll-padding-top: var(--header-h);
  background: var(--bg);
}

body {
  font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.55;
  font-size: 15px;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  overflow-x: hidden;
}

a { color: inherit; text-decoration: none; }
img, video, svg { display: block; max-width: 100%; }
button { font-family: inherit; cursor: pointer; border: none; background: none; }
::selection { background: var(--accent); color: var(--bg); }

/* ════════════════════════════════════════
   FIXED HEADER — solid, opaque, flat
════════════════════════════════════════ */
.header {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 100;
  height: var(--header-h);
  background: var(--bg);
  border-bottom: 1px solid var(--border);
}

.header-inner {
  height: 100%;
  max-width: var(--max-w);
  margin: 0 auto;
  padding: 0 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 20px;
}

.nav-left, .nav-right {
  display: flex;
  align-items: center;
}
.nav-left  { gap: 4px; }
.nav-right { gap: 14px; }

.nav-btn {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  font-size: 13px;
  font-weight: 500;
  color: var(--text-muted);
  padding: 7px 12px;
  border-radius: var(--r-sm);
  transition: color var(--t), background var(--t), border-color var(--t);
  letter-spacing: -0.005em;
  border: 1px solid transparent;
}
.nav-btn svg { opacity: 0.9; flex-shrink: 0; }
.nav-btn:hover { color: var(--text); background: var(--surface-2); }

.nav-btn.cta {
  color: #0d0d0d;
  background: var(--accent);
  border-color: var(--accent);
  font-weight: 600;
}
.nav-btn.cta:hover {
  background: var(--accent-hover);
  border-color: var(--accent-hover);
  color: #0d0d0d;
}
.nav-btn.cta svg { opacity: 1; color: #0d0d0d; }

.nav-btn.active {
  color: var(--text);
  background: var(--surface-2);
  border-color: var(--border-2);
}
.nav-btn.active svg { opacity: 1; color: var(--accent); }

.nav-btn.home { color: var(--text-muted); }
.nav-btn.home:hover { color: var(--accent); border-color: var(--border-2); background: var(--surface-2); }
.nav-btn.home:hover svg { color: var(--accent); }

.rate-text {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 12.5px;
  color: var(--text-dim);
  font-weight: 400;
  white-space: nowrap;
}
.rate-text strong { color: var(--accent-2); font-weight: 600; }

.header-links {
  display: flex;
  align-items: center;
  gap: 2px;
}

.icon-link {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 30px;
  height: 30px;
  color: var(--text-muted);
  border-radius: var(--r-sm);
  transition: color var(--t), background var(--t);
}
.icon-link:hover { color: var(--accent); background: var(--surface-2); }
.icon-link svg { width: 15px; height: 15px; }

.divider-v {
  width: 1px;
  height: 18px;
  background: var(--border-2);
  flex-shrink: 0;
}

/* ════════════════════════════════════════
   PAGE HEADER — flat, no gradients
════════════════════════════════════════ */
.page-head {
  position: relative;
  text-align: center;
  padding: calc(var(--header-h) + 64px) 28px 56px;
  border-bottom: 1px solid var(--border);
  background: var(--bg);
  overflow: hidden;
}

.page-head-content {
  position: relative;
  max-width: 720px;
  margin: 0 auto;
}

.page-icon {
  width: 56px;
  height: 56px;
  margin: 0 auto 22px;
  overflow: hidden;
  border: 1px solid var(--border-2);
  background: #000;
}
.page-icon svg { width: 100%; height: 100%; display: block; }

.page-head h1 {
  font-size: clamp(34px, 5vw, 50px);
  font-weight: 600;
  letter-spacing: -0.028em;
  line-height: 1.08;
  color: var(--text);
}
.page-head h1 .accent { color: var(--accent); }

.page-tagline {
  margin-top: 16px;
  font-size: clamp(15px, 1.2vw, 16.5px);
  color: var(--text-muted);
  line-height: 1.6;
  max-width: 580px;
  margin-left: auto;
  margin-right: auto;
}

/* ════════════════════════════════════════
   PAGE CONTENT WRAPPER (Widescreen Version for Data)
════════════════════════════════════════ */
.page-content {
  max-width: var(--max-w);
  margin: 0 auto;
  padding: 56px 24px 96px;
}

/* ════════════════════════════════════════
   LIVE MATRIX SEARCH BAR
════════════════════════════════════════ */
.search-container {
  margin-bottom: 40px;
  max-width: 420px;
}
.search-input {
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border-3);
  color: var(--text);
  padding: 11px 16px;
  font-family: inherit;
  font-size: 14.5px;
  border-radius: var(--r-md);
  outline: none;
  transition: border-color var(--t), background var(--t);
}
.search-input:focus {
  border-color: var(--accent);
  background: var(--surface-2);
}

/* ════════════════════════════════════════
   COMPATIBILITY MATRIX TABLES STRUCTURE
════════════════════════════════════════ */
.category-block {
  margin-bottom: 48px;
}
.category-title {
  font-size: 18px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 16px;
  letter-spacing: -0.01em;
  display: flex;
  align-items: center;
  gap: 10px;
}
.category-title::before {
  content: '';
  width: 6px;
  height: 6px;
  background: var(--accent);
  display: inline-block;
  border-radius: 50%;
}

.table-wrapper {
  border: 1px solid var(--border-2);
  border-radius: var(--r-md);
  background: var(--surface);
  overflow-x: auto;
}

table {
  width: 100%;
  border-collapse: collapse;
  text-align: left;
}

th {
  background: var(--surface-2);
  color: var(--text-muted);
  font-size: 11.5px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  padding: 12px 18px;
  border-bottom: 1px solid var(--border-2);
}

td {
  padding: 14px 18px;
  border-bottom: 1px solid var(--border);
  vertical-align: top;
  font-size: 14px;
}
tr:last-child td { border-bottom: none; }
tr:hover td { background: var(--surface-2); }

.prop-name { font-weight: 500; color: var(--text); }
.code-inline {
  font-family: ui-monospace, "SF Mono", "JetBrains Mono", Menlo, monospace;
  font-size: 12.5px;
  color: var(--text-muted);
  background: var(--surface-3);
  padding: 3px 6px;
  border-radius: var(--r-sm);
  border: 1px solid var(--border);
}

/* Action Engine Status Badges */
.badge {
  display: inline-flex;
  align-items: center;
  font-size: 10.5px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  padding: 3px 8px;
  border-radius: var(--r-sm);
}
.badge.yes      { background: var(--accent-deep); color: var(--accent); }
.badge.partial  { background: #3a2f1d; color: #eec14a; }
.badge.no       { background: #3a1d1d; color: #f46363; }

.badge.dd-yes   { border: 1px solid var(--border-3); color: var(--text-muted); background: transparent; }
.badge.dd-no    { color: var(--text-dim); }

.notes-cell {
  color: var(--text-muted);
  font-size: 13.5px;
  line-height: 1.5;
}

.error-banner {
  background: #3a1d1d;
  border: 1px solid #f46363;
  color: #f46363;
  padding: 16px;
  border-radius: var(--r-md);
  margin-bottom: 30px;
  font-size: 14px;
}
.error-banner code {
  background: #221111;
  padding: 2px 6px;
  border-radius: 3px;
  color: #ff8888;
}

.no-results {
  display: none;
  text-align: center;
  padding: 40px;
  color: var(--text-dim);
  border: 1px dashed var(--border-3);
  border-radius: var(--r-md);
}

/* ════════════════════════════════════════
   PAGE FOOTER
════════════════════════════════════════ */
.page-foot {
  margin-top: 64px;
  padding-top: 24px;
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  font-size: 12px;
  color: var(--text-dim);
  flex-wrap: wrap;
}
.page-foot a { color: var(--text-muted); transition: color var(--t); }
.page-foot a:hover { color: var(--accent); }

/* ════════════════════════════════════════
   BACK TO TOP — flat, opaque
════════════════════════════════════════ */
.back-top {
  position: fixed;
  bottom: 24px;
  right: 24px;
  width: 40px;
  height: 40px;
  border-radius: var(--r-md);
  background: var(--surface-2);
  border: 1px solid var(--border-2);
  color: var(--text-muted);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  opacity: 0;
  pointer-events: none;
  transform: translateY(8px);
  transition: opacity var(--t-slow), transform var(--t-slow), background var(--t), border-color var(--t), color var(--t);
  z-index: 90;
}
.back-top.visible {
  opacity: 1;
  pointer-events: auto;
  transform: translateY(0);
}
.back-top:hover {
  background: var(--surface-3);
  border-color: var(--accent);
  color: var(--accent);
}
.back-top svg { width: 14px; height: 14px; }

/* ════════════════════════════════════════
   RESPONSIVE
════════════════════════════════════════ */
@media (max-width: 768px) {
  :root { --header-h: 52px; }

  .header-inner { padding: 0 14px; gap: 8px; }
  .nav-btn { padding: 7px 10px; font-size: 12.5px; }
  .nav-btn .label { display: none; }
  .nav-btn.cta .label { display: inline; }
  .rate-text { display: none; }
  .divider-v { display: none; }
  .nav-right { gap: 4px; }

  .page-head { padding: calc(var(--header-h) + 44px) 18px 40px; }
  .page-icon { width: 48px; height: 48px; margin-bottom: 18px; }

  .page-content { padding: 40px 18px 72px; }
  
  th, td { padding: 12px 14px; font-size: 13px; }
  .code-inline { font-size: 11.5px; }
  .category-title { font-size: 16px; }

  .page-foot { font-size: 11.5px; gap: 10px; flex-direction: column; text-align: center; }
  .back-top { bottom: 16px; right: 16px; width: 36px; height: 36px; }
}

@media (max-width: 420px) {
  .nav-btn { padding: 6px 8px; gap: 0; }
  .header-inner { gap: 4px; }
}
</style>
</head>

  <div class="header-inner">
