# QGIS to MapLibre Property Vector Tile Compatibility Map
categories:
  - name: "Polygon Fill Layers"
    properties:
      - qgis_prop: "Fill color"
        maplibre_prop: "fill-color"
        supported: "Yes"
        data_driven: "Yes"
        notes: "Fully supported. Maps directly to MapLibre expressions for data-defined overrides."
      - qgis_prop: "Stroke color"
        maplibre_prop: "fill-outline-color"
        supported: "Partial"
        data_driven: "No"
        notes: "Only works if Stroke Width is set to 1px. For wider borders, use a separate Line layer configuration."
      - qgis_prop: "Stroke width"
        maplibre_prop: "N/A"
        supported: "No"
        data_driven: "No"
        notes: "Native MapLibre fill layers do not support outline width. Add a QGIS Line symbol layer to output a true 'line' type feature."

  - name: "Line / Stroke Layers"
    properties:
      - qgis_prop: "Stroke color"
        maplibre_prop: "line-color"
        supported: "Yes"
        data_driven: "Yes"
        notes: "Supports RGBA colors and data-driven attribute mapping."
      - qgis_prop: "Stroke width"
        maplibre_prop: "line-width"
        supported: "Yes"
        data_driven: "Yes"
        notes: "Converts millimeter/point units safely to pixel definitions at nominal zoom levels."
      - qgis_prop: "Join style"
        maplibre_prop: "line-join"
        supported: "Yes"
        data_driven: "No"
        notes: "Bevel, Miter, and Round configurations map cleanly to native layout values."

  - name: "Labeling Properties"
    properties:
      - qgis_prop: "Value (Text expression)"
        maplibre_prop: "text-field"
        supported: "Yes"
        data_driven: "Yes"
        notes: "Standard fields and concatenated text strings match MapLibre syntax conventions."
      - qgis_prop: "Font family"
        maplibre_prop: "text-font"
        supported: "Partial"
        data_driven: "No"
        notes: "Requires corresponding fonts to be available in your target web glyphs directory."